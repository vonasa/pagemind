services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: pagemind
      POSTGRES_USER: pagemind
      POSTGRES_PASSWORD: pagemind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pagemind -d pagemind"]
      interval: 5s
      timeout: 5s
      retries: 12

# The embedding server (Infinity) runs natively on the host, not in Docker —
# start it with `just embed`. See the README for details.

volumes:
  pgdata:
